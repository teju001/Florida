<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Flow Flown Florida · Aug 1–6, 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Monoton&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --night:#150A2E;
  --dusk:#25104A;
  --panel:#2A1352;
  --line:#43206E;
  --cream:#FFF3E6;
  --muted:#A98FC7;
  --pink:#FF3D9A;
  --aqua:#1FE3D6;
  --sun:#FFD23F;
  --coral:#FF6B3D;
  --lilac:#B06CF5;
  --lime:#8BEF4D;
  --accent:var(--pink);
  --r:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;scroll-behavior:smooth}
body{
  background:var(--night);color:var(--cream);
  font-family:'Space Grotesk',system-ui,sans-serif;font-size:15px;line-height:1.55;
  padding-bottom:70px;-webkit-font-smoothing:antialiased;overflow-x:hidden;
}
.wrap{max-width:840px;margin:0 auto;padding:0 16px}

/* ---------- hero ---------- */
header{position:relative;overflow:hidden;border-bottom:2px solid var(--line)}
.sunset{
  position:absolute;inset:0;
  background:
    radial-gradient(closest-side at 50% 88%, var(--sun) 0%, var(--coral) 42%, var(--pink) 68%, transparent 78%),
    linear-gradient(180deg,#0C0520 0%,#3B1263 55%,#5A1A7A 100%);
  background-color:#150A2E;opacity:.55;
}
.grid-lines{
  position:absolute;left:0;right:0;bottom:0;height:70px;
  background:repeating-linear-gradient(90deg,transparent 0 38px,rgba(31,227,214,.28) 38px 39px);
  mask-image:linear-gradient(180deg,transparent,#000);
  -webkit-mask-image:linear-gradient(180deg,transparent,#000);
}
.hero{position:relative;padding:26px 0 0}
.eyebrow{
  font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.22em;
  text-transform:uppercase;color:var(--aqua);
}
h1{
  font-family:'Monoton',cursive;font-weight:400;
  font-size:clamp(30px,9.2vw,58px);line-height:1.08;letter-spacing:.02em;
  margin:10px 0 4px;color:var(--cream);
  text-shadow:0 0 6px rgba(255,61,154,.9),0 0 22px rgba(255,61,154,.55),0 0 48px rgba(176,108,245,.45);
}
h1 span{color:var(--sun);text-shadow:0 0 6px rgba(255,210,63,.9),0 0 24px rgba(255,107,61,.6)}
.dates{font-family:'Space Mono',monospace;font-size:12.5px;color:var(--cream);opacity:.85;margin-bottom:14px}
.dates b{color:var(--aqua)}

/* name ticker */
.ticker{
  position:relative;overflow:hidden;border-top:1px solid var(--line);border-bottom:1px solid var(--line);
  background:rgba(21,10,46,.55);
}
.ticker div{
  display:inline-block;white-space:nowrap;padding:7px 0;
  font-family:'Space Mono',monospace;font-weight:700;font-size:12px;letter-spacing:.24em;
  text-transform:uppercase;color:var(--aqua);
  animation:roll 26s linear infinite;
}
.ticker b{color:var(--sun);margin:0 6px}
@keyframes roll{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* ---------- nav ---------- */
nav{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;padding:9px 0 0}
nav::-webkit-scrollbar{display:none}
nav button{
  flex:0 0 auto;background:rgba(255,255,255,.05);border:1px solid var(--line);
  border-radius:999px;color:var(--muted);
  font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:13px;letter-spacing:.04em;
  padding:6px 14px;cursor:pointer;white-space:nowrap;transition:.16s;
}
nav button:hover{color:var(--cream);border-color:var(--muted)}
nav button[aria-selected="true"]{
  background:var(--tabc,var(--pink));border-color:var(--tabc,var(--pink));
  color:#150A2E;box-shadow:0 0 16px -2px var(--tabc,var(--pink));
}
nav button:focus-visible{outline:2px solid var(--aqua);outline-offset:2px}

/* ---------- panels ---------- */
.panel{padding:24px 0 40px}
.dayhead{border-bottom:2px solid var(--accent);padding-bottom:14px}
.dayhead .kicker{
  font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.18em;
  text-transform:uppercase;color:var(--accent);
}
.dayhead h2{font-weight:700;font-size:clamp(25px,6.4vw,34px);line-height:1.1;margin-top:5px;letter-spacing:-.02em}
.dayhead p{color:var(--muted);font-size:14px;margin-top:9px;max-width:62ch}

/* ---------- timeline ---------- */
.tl{margin-top:20px}
.stop{display:grid;grid-template-columns:74px 1fr;gap:13px;align-items:start}
.t{
  font-family:'Space Mono',monospace;font-weight:700;font-size:14px;
  color:var(--accent);padding-top:13px;text-align:right;letter-spacing:-.03em;
}
.t small{display:block;font-weight:400;font-size:9.5px;color:var(--muted);letter-spacing:.08em}
.card{
  background:var(--panel);border:1px solid var(--line);
  border-left:4px solid var(--line);border-radius:var(--r);
  padding:12px 14px;margin-bottom:9px;
}
.card.key{border-left-color:var(--accent)}
.card.hard{border-left-color:var(--coral);background:linear-gradient(180deg,rgba(255,107,61,.10),transparent 70%)}
.card h3{font-size:15.5px;font-weight:600;line-height:1.32}
.card p{font-size:13.5px;color:var(--muted);margin-top:5px}
.flag{
  display:inline-block;font-family:'Space Mono',monospace;font-size:9.5px;font-weight:700;
  letter-spacing:.15em;text-transform:uppercase;color:#150A2E;background:var(--coral);
  border-radius:4px;padding:2px 7px;margin-bottom:7px;
}
.maplink{
  display:inline-flex;align-items:center;gap:6px;margin-top:9px;
  font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.05em;
  color:var(--aqua);text-decoration:none;border:1px solid rgba(31,227,214,.4);
  border-radius:999px;padding:4px 12px;transition:.16s;
}
.maplink:hover{background:rgba(31,227,214,.14);border-color:var(--aqua)}
.maplink:focus-visible{outline:2px solid var(--aqua);outline-offset:2px}

/* signature: drive connector */
.drive{display:grid;grid-template-columns:74px 1fr;gap:13px;align-items:center;margin:0 0 10px}
.drive .rail{grid-column:2;display:flex;align-items:center;gap:9px}
.drive .dash{flex:1;height:0;border-top:2px dashed var(--line)}
.drive span{
  font-family:'Space Mono',monospace;font-size:10.5px;letter-spacing:.1em;
  text-transform:uppercase;color:var(--muted);white-space:nowrap;
}

/* ---------- blocks ---------- */
.note{
  background:rgba(255,107,61,.09);border:1px solid rgba(255,107,61,.4);
  border-radius:var(--r);padding:13px 15px;margin:18px 0;font-size:13.5px;
}
.note strong{color:var(--coral)}
.note.good{background:rgba(31,227,214,.08);border-color:rgba(31,227,214,.4)}
.note.good strong{color:var(--aqua)}
.block{margin-bottom:32px}
h3.sec{
  font-weight:700;font-size:19px;letter-spacing:-.01em;
  border-bottom:2px solid var(--line);padding-bottom:8px;margin-bottom:14px;
}
table{width:100%;border-collapse:collapse;font-size:13.5px}
th,td{text-align:left;padding:9px 6px;border-bottom:1px solid var(--line)}
th{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);font-weight:400}
td.num{font-family:'Space Mono',monospace;text-align:right;white-space:nowrap}
tr.total td{border-bottom:0;border-top:2px solid var(--sun);font-weight:700;color:var(--sun);padding-top:12px}

/* ---------- crew cards ---------- */
.crew{display:grid;gap:12px;margin-top:20px}
@media(min-width:640px){.crew{grid-template-columns:1fr 1fr}}
.person{
  position:relative;overflow:hidden;border-radius:var(--r);padding:16px;
  background:linear-gradient(145deg,var(--pc) -55%,var(--panel) 46%);
  border:1px solid var(--line);border-top:3px solid var(--pc);
}
.person .badge{
  position:absolute;top:12px;right:13px;font-family:'Space Mono',monospace;
  font-size:26px;opacity:.9;
}
.person .nm{
  font-family:'Monoton',cursive;font-size:23px;line-height:1.2;color:var(--pc);
  text-shadow:0 0 12px color-mix(in srgb, var(--pc) 55%, transparent);
}
.person .rl{
  font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.16em;
  text-transform:uppercase;color:var(--cream);opacity:.75;margin-top:4px;
}
.person p{font-size:13px;color:var(--muted);margin-top:9px}
.person .stat{
  font-family:'Space Mono',monospace;font-size:11px;color:var(--pc);
  margin-top:10px;padding-top:9px;border-top:1px dashed var(--line);
}

/* ---------- checklists ---------- */
.chk{display:flex;gap:12px;align-items:flex-start;background:var(--panel);
  border:1px solid var(--line);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:.16s}
.chk:hover{border-color:var(--muted)}
.chk input{margin-top:3px;width:18px;height:18px;accent-color:var(--aqua);flex:0 0 auto;cursor:pointer}
.chk .txt{font-size:14px;font-weight:500}
.chk .sm{font-size:12.5px;color:var(--muted);margin-top:4px;display:block}
.chk.done{opacity:.42}
.chk.done .txt,.chk.done .sm{text-decoration:line-through}
.chk:focus-within{border-color:var(--aqua)}
.pill{display:inline-block;font-family:'Space Mono',monospace;font-size:9px;font-weight:700;
  letter-spacing:.14em;text-transform:uppercase;padding:2px 7px;border-radius:4px;
  background:var(--coral);color:#150A2E;margin-right:7px;vertical-align:1px}
ul.plain{list-style:none;font-size:13.5px}
ul.plain li{padding:6px 0 6px 16px;position:relative;color:var(--muted)}
ul.plain li::before{content:'';position:absolute;left:0;top:14px;width:6px;height:6px;background:var(--accent);border-radius:50%}
ul.plain li b{color:var(--cream);font-weight:600}
.grouphead{font-family:'Space Mono',monospace;font-size:10.5px;letter-spacing:.14em;
  text-transform:uppercase;color:var(--sun);margin-bottom:8px}

footer{border-top:1px solid var(--line);padding:20px 0 34px;
  font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);text-align:center;line-height:1.9}
footer b{color:var(--pink)}

@media (max-width:520px){
  .stop,.drive{grid-template-columns:58px 1fr;gap:10px}
  .t{font-size:12.5px}
}
@media (prefers-reduced-motion:reduce){
  *{transition:none!important}
  .ticker div{animation:none}
}
</style>
</head>
<body>

<footer class="wrap">

</footer>

function select(id){
  [...nav.children].forEach(b=>b.setAttribute('aria-selected',b.dataset.for===id?'true':'false'));
  const d=DAYS.find(x=>x.id===id);
  const tab=TABS.find(x=>x.id===id);
  document.documentElement.style.setProperty('--accent',tab.c);
  main.innerHTML=`<section class="panel">${
    d?dayHTML(d):id==='crew'?crewHTML():id==='budget'?budgetHTML():
    id==='pack'?packHTML():todoHTML()}</section>`;
  window.scrollTo({top:0,behavior:'instant'});
  wireChecks();
}

/* storage: artifact API if present, otherwise localStorage. Never blocks. */
const Store={
  async get(k){
    try{ if(window.storage){const r=await window.storage.get(k);return r?r.value:null;} }catch(e){}
    try{ return localStorage.getItem(k); }catch(e){ return null; }
  },
  async set(k,v){
    try{ if(window.storage){await window.storage.set(k,v);return;} }catch(e){}
    try{ localStorage.setItem(k,v); }catch(e){}
  }
};

let STATE={};
function wireChecks(){
  document.querySelectorAll('.chk input').forEach(inp=>{
    const id=inp.dataset.id;
    if(STATE[id]){inp.checked=true;inp.closest('.chk').classList.add('done');}
    inp.onchange=()=>{
      STATE[id]=inp.checked;
      inp.closest('.chk').classList.toggle('done',inp.checked);
      Store.set('fl26-checks',JSON.stringify(STATE));
    };
  });
}

(async function init(){
  try{const raw=await Store.get('fl26-checks'); if(raw) STATE=JSON.parse(raw);}catch(e){STATE={};}
  const n=new Date();
  let open='d1';
  if(n.getFullYear()===2026&&n.getMonth()===7&&n.getDate()>=1&&n.getDate()<=6) open='d'+n.getDate();
  select(open);
})();
</script>
